name: macOS Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build universal app
        run: ./scripts/build-app.sh

      - name: Package app
        run: ditto -c -k --keepParent dist/FocusC.app FocusC-macOS.zip

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: FocusC-macOS
          path: FocusC-macOS.zip

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" FocusC-macOS.zip --clobber
          else
            gh release create "$GITHUB_REF_NAME" FocusC-macOS.zip --title "$GITHUB_REF_NAME" --generate-notes
          fi
